<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Página no encontrada | Atmen</title>
  <meta name="description" content="La página que buscas no existe. Estos enlaces te pueden ayudar a encontrar lo que necesitas.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0077b6">

  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="apple-touch-icon" href="/images/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  </noscript>

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/site.css">

  <style>
    .err {
      min-height: 100vh;
      display: grid; place-items: center;
      padding: var(--sp-6);
      background:
        radial-gradient(ellipse at 80% 10%, rgba(0,180,216,.18), transparent 55%),
        radial-gradient(ellipse at 10% 90%, rgba(6,167,125,.14), transparent 55%),
        var(--paper);
    }
    .err__card {
      max-width: 640px;
      width: 100%;
      padding: clamp(28px, 4vw, 48px);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--r-2xl);
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    .err__num {
      font-size: clamp(4.5rem, 14vw, 8rem);
      font-weight: 800; line-height: 1;
      letter-spacing: -.04em;
      background: linear-gradient(135deg, var(--sea), var(--leaf));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin: 0 0 var(--sp-3);
    }
    .err__list {
      list-style: none; padding: 0; margin: var(--sp-5) 0 0;
      display: grid; gap: var(--sp-2); text-align: left;
    }
    .err__list a {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px;
      border-radius: var(--r-md);
      background: var(--cloud);
      color: var(--ink); text-decoration: none;
      transition: background .2s var(--ease), transform .2s var(--ease);
      font-weight: 600;
    }
    .err__list a:hover { background: var(--cloud-alt); transform: translateX(4px); }
    .err__list a::after { content: "→"; color: var(--sea); }
    .err__cta { margin-top: var(--sp-5); }
  </style>
</head>
<body>
  <main class="err">
    <div class="err__card">
      <p class="err__num" aria-hidden="true">404</p>
      <h1 style="font-size: var(--fs-xl); margin-top: 0;">Esta página no existe.</h1>
      <p class="muted">Es posible que el enlace haya cambiado o esté incompleto. Estos recursos pueden ayudarte:</p>
      <ul class="err__list">
        <li><a href="/">Inicio</a></li>
        <li><a href="/sobre-el-doctor/">Sobre el Dr. Robinson Robles</a></li>
        <li><a href="/preguntas-frecuentes/">Preguntas frecuentes</a></li>
        <li><a href="/contacto/">Contacto y ubicación</a></li>
        <li><a href="/informacion-regulatoria/">Información regulatoria</a></li>
        <li><a href="/aviso-de-privacidad/">Aviso de Privacidad</a></li>
      </ul>
      <div class="err__cta">
        <a class="btn btn--whatsapp"
           href="https://wa.me/5215614838970?text=Hola%2C%20me%20gustar%C3%ADa%20agendar%20una%20consulta%20de%20neumolog%C3%ADa.">
          Escribir por WhatsApp
        </a>
      </div>
    </div>
  </main>
</body>
</html>
