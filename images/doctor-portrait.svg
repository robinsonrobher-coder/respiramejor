<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" role="img" aria-label="Dr. Robinson Robles, Neumólogo — retrato editorial (foto profesional pendiente)">
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#03045e"/>
      <stop offset="48%"  stop-color="#023e8a"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="26%" r="62%">
      <stop offset="0%"  stop-color="#48cae4" stop-opacity=".55"/>
      <stop offset="55%" stop-color="#0096c7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#eafaff" stop-opacity=".95"/>
      <stop offset="55%"  stop-color="#bfe9f3" stop-opacity=".80"/>
      <stop offset="100%" stop-color="#90e0ef" stop-opacity=".45"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#caf0f8"/>
      <stop offset="100%" stop-color="#06a77d"/>
    </linearGradient>
    <clipPath id="frame"><rect width="400" height="500" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- Campo de marca -->
    <rect width="400" height="500" fill="url(#field)"/>
    <rect width="400" height="500" fill="url(#glow)"/>

    <!-- Anillos de respiración (firma) -->
    <g fill="none" stroke="#ffffff" stroke-opacity=".10">
      <circle cx="200" cy="208" r="118"/>
      <circle cx="200" cy="208" r="158"/>
      <circle cx="200" cy="208" r="198"/>
    </g>

    <!-- Silueta médica: hombros + bata -->
    <path d="M44 500 V440 C44 384 116 352 200 352 C284 352 356 384 356 440 V500 Z" fill="url(#figure)"/>
    <!-- Apertura de bata / cuello en V -->
    <path d="M200 360 L172 500 L188 500 L200 404 L212 500 L228 500 Z" fill="#023e8a" fill-opacity=".28"/>
    <!-- Cuello -->
    <rect x="181" y="300" width="38" height="64" rx="16" fill="url(#figure)"/>
    <!-- Cabeza (silueta limpia, sin rasgos) -->
    <ellipse cx="200" cy="206" rx="74" ry="86" fill="url(#figure)"/>

    <!-- Luz de borde sutil sobre la figura -->
    <path d="M126 206 C126 150 158 120 200 120" fill="none" stroke="url(#rim)" stroke-width="3" stroke-linecap="round" stroke-opacity=".8"/>
    <path d="M52 444 C52 392 120 360 200 358" fill="none" stroke="url(#rim)" stroke-width="2.5" stroke-linecap="round" stroke-opacity=".55"/>

    <!-- Trazo flow-volume (firma respiratoria) -->
    <path d="M40 470 Q120 430 200 458 T 360 452" fill="none" stroke="#06a77d" stroke-width="2.4" stroke-opacity=".7"/>
    <path d="M40 484 Q120 448 200 472 T 360 468" fill="none" stroke="#48cae4" stroke-width="2" stroke-opacity=".55"/>

    <!-- Estetoscopio insinuado -->
    <path d="M168 372 Q200 416 232 372" fill="none" stroke="#caf0f8" stroke-width="4" stroke-linecap="round" stroke-opacity=".7"/>
    <circle cx="234" cy="372" r="6.5" fill="#caf0f8" fill-opacity=".8"/>

    <!-- Pie: nota de placeholder elegante -->
    <text x="200" y="486" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="13"
          fill="#caf0f8" fill-opacity=".75" text-anchor="middle" letter-spacing=".02em">Foto profesional · próximamente</text>
  </g>
</svg>
